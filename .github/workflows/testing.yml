name: Suite de Pruebas XBank

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Instalar dependencias
      run: npm ci
      
    - name: Ejecutar pruebas unitarias
      run: npm test -- --run
      # Inyectamos variables falsas para que config.js no colapse en la nube
      env:
        VITE_FIREBASE_API_KEY: "test-key"
        VITE_FIREBASE_AUTH_DOMAIN: "test-domain"
        VITE_FIREBASE_PROJECT_ID: "test-project"
        VITE_FIREBASE_STORAGE_BUCKET: "test-bucket"
        VITE_FIREBASE_MESSAGING_SENDER_ID: "test-sender"
        VITE_FIREBASE_APP_ID: "test-app-id"